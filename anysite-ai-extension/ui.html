<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* Professional Black & White Theme */
    :root {
      --bg-base: #000000;
      --bg-surface: #121212;
      --border-subtle: #333333;
      --text-main: #ffffff;
      --text-muted: #a0a0a0;
      --accent: #ffffff;
      --accent-invert: #000000;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      /* Subtle grid background element for a high-tech, professional look */
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* Header */
    header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-base);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    header h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(255,255,255,0.8);
    }

    /* Chat Area */
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 10px; }

/* --- Chat Bubbles Styling --- */
    .msg {
      max-width: 85%;
      padding: 14px 18px; /* Restored: This gives the box its size! */
      border-radius: 12px; /* Restored: Rounded corners */
      font-size: 15px; /* Increased for better readability */
      line-height: 1.6;
      word-wrap: break-word;
      /* Font support for Markdown/Hindi */
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    .msg.user {
      align-self: flex-end;
      background-color: var(--accent);
      color: var(--accent-invert);
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }

    .msg.ai {
      align-self: flex-start;
      background-color: var(--bg-surface);
      color: var(--text-main);
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: 4px;
    }

    /* --- Markdown Elements inside AI Bubbles --- */
    .msg p { margin: 0 0 8px 0; }
    .msg p:last-child { margin: 0; }
    
    .msg ul { 
      margin: 8px 0 0 0; 
      padding-left: 24px; 
    }
    
    .msg li { 
      margin-bottom: 6px; 
      line-height: 1.5;
    }
    
    .msg strong { 
      font-weight: 700; 
      color: #ffffff; 
    }

    .msg.user {
      align-self: flex-end;
      background-color: var(--accent);
      color: var(--accent-invert);
      border-bottom-right-radius: 2px;
      font-weight: 500;
    }

    .msg.ai {
      align-self: flex-start;
      background-color: var(--bg-surface);
      color: var(--text-main);
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: 2px;
    }

    /* Input Area */
    .input-container {
      padding: 16px 20px;
      background: var(--bg-base);
      border-top: 1px solid var(--border-subtle);
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 6px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      color: var(--text-main);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input::placeholder { color: var(--text-muted); }
    input:focus { border-color: var(--accent); }

    button {
      padding: 0 20px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: var(--accent-invert);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    button:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <header>
    <div class="status-dot"></div>
    <h2>BrickByBrick AI</h2>
  </header>

  <div id="log">
    <div class="msg ai">System ready. How can I assist you with this page?</div>
  </div>
  
  <div class="input-container">
    <input type="text" id="q" placeholder="Type your message..." autocomplete="off">
    <button id="btn">Send</button>
  </div>

  <script src="ui.js"></script>
</body>
</html>
